<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 700 490" width="700" height="490">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="700" height="490" fill="#ffffff"/>
  <rect x="60" y="40" width="160" height="80" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="140" y="70" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Motor Task</text>
  <text x="140" y="90" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Priority 3</text>
  <rect x="270" y="40" width="160" height="80" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="350" y="70" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Comms Task</text>
  <text x="350" y="90" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Priority 2</text>
  <rect x="480" y="40" width="160" height="80" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="560" y="70" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">UI Task</text>
  <text x="560" y="90" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Priority 1</text>
  <line x1="140" y1="120" x2="210" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="350" y1="120" x2="350" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="166" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">blocking API / notifications</text>
  <line x1="560" y1="120" x2="490" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
