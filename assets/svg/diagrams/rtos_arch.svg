  <text x="350" y="440" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">HARDWARE</text>
  <text x="350" y="460" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">SysTick  ·  NVIC  ·  Peripherals  ·  SRAM</text>
