<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 630" width="800" height="630">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="800" height="630" fill="#ffffff"/>
  <rect x="60" y="40" width="200" height="80" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="160" y="70" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">HARDWARE / ISRs</text>
  <text x="160" y="90" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">(GPIO, UART, Timer)</text>
  <rect x="540" y="40" width="200" height="80" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="640" y="70" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">PERIPHERAL DRIVERS</text>
  <text x="640" y="90" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">(SPI, I2C, ADC)</text>
  <line x1="160" y1="120" x2="370" y2="220" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="265" y="161" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">events</text>
  <line x1="640" y1="120" x2="430" y2="220" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="535" y="161" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">callbacks</text>
  <rect x="280" y="220" width="240" height="80" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="13">EVENT QUEUE</text>
  <text x="400" y="270" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="13">(ring buffer / flags)</text>
  <line x1="400" y1="300" x2="400" y2="380" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="220" y="380" width="360" height="90" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="400" y="405" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">STATE MACHINE DISPATCHER</text>
  <text x="400" y="425" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">current state · transition table</text>
  <text x="400" y="445" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">entry / exit actions</text>
  <line x1="310" y1="470" x2="160" y2="540" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="470" x2="640" y2="540" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="540" width="200" height="80" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="160" y="560" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">OUTPUT ACTIONS</text>
  <text x="160" y="580" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">(HAL, actuators,</text>
  <text x="160" y="600" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">display updates)</text>
  <rect x="540" y="540" width="200" height="80" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="640" y="560" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">APPLICATION LOGIC</text>
  <text x="640" y="580" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">(business rules,</text>
  <text x="640" y="600" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">data processing)</text>
</svg>