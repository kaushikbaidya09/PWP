<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 700 980" width="700" height="980">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="700" height="980" fill="#ffffff"/>
  <rect x="200" y="20" width="300" height="60" rx="8" fill="#f9fafb" stroke="#374151" stroke-width="2"/>
  <text x="350" y="50" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="13">PHYSICAL WORLD</text>
  <line x1="350" y1="80" x2="350" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="111" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">raw signal</text>
  <rect x="200" y="160" width="300" height="90" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="350" y="186" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">Sensor / Transducer</text>
  <text x="350" y="205" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">(thermocouple, microphone,</text>
  <text x="350" y="224" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">strain gauge, ...)</text>
  <line x1="350" y1="250" x2="350" y2="340" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="286" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">raw voltage</text>
  <rect x="200" y="340" width="300" height="100" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="350" y="371" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="12">Signal Conditioning</text>
  <text x="350" y="390" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="12">(amplify · level-shift</text>
  <text x="350" y="409" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="12">anti-alias filter · impedance buffer)</text>
  <line x1="350" y1="440" x2="350" y2="530" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="476" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">conditioned voltage</text>
  <rect x="200" y="530" width="300" height="90" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="350" y="565" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">MCU ADC</text>
  <text x="350" y="585" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">Sample-Hold → Compare → Register</text>
  <line x1="350" y1="620" x2="350" y2="710" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="656" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">digital count</text>
  <rect x="200" y="710" width="300" height="90" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="350" y="745" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Firmware</text>
  <text x="350" y="765" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">(scale, calibrate, filter)</text>
  <line x1="350" y1="800" x2="350" y2="890" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="836" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">processed value</text>
  <rect x="200" y="890" width="300" height="90" rx="8" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  <text x="350" y="926" text-anchor="middle" dominant-baseline="middle" fill="#7f1d1d" font-size="12">DAC → Output Conditioning</text>
  <text x="350" y="945" text-anchor="middle" dominant-baseline="middle" fill="#7f1d1d" font-size="12">→ Actuator / Load</text>
</svg>