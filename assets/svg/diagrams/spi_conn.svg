  <text x="350" y="75" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">SCK · MOSI · MISO</text>
  <text x="350" y="95" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">CS0 · CS1 · CS2</text>
  <line x1="350" y1="120" x2="350" y2="170" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
