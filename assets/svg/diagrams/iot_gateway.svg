<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" fill="none" aria-label="Industrial IoT Gateway Architecture"><style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&amp;display=swap');
