lass="t1" x="238" y="190">Client</text><text class="t3" x="238" y="200">AWS IoT</text><text class="t3" x="238" y="212">Azure Hub</text><rect class="box" x="310" y="160" width="120" height="56" rx="4"/><text class="t1" x="370" y="176">Local</text><text class="t1" x="370" y="190">Storage</text><text class="t3" x="370" y="200">SD card</text><text class="t3" x="370" y="212">Store+Fwd</text><rect class="box" x="442" y="160" width="120" height="56" rx="4"/><text class="t1" x="502" y="176">OTA</text><text class="t1" x="502" y="190">Update</text><text class="t3" x="502" y="200">Signed</text><text class="t3" x="502" y="212">images</text><line class="arr" x1="298" y1="92" x2="308" y2="92"/><line class="arr" x1="430" y1="92" x2="440" y2="92"/><line class="arr" x1="298" y1="188" x2="308" y2="188"/><line class="arr" x1="430" y1="188" x2="440" y2="188"/><rect class="box" x="626" y="30" width="120" height="200" rx="6"/><text class="t1" x="686" y="48">CLOUD</text><line class="div" x1="627" y1="56" x2="745" y2="56"/><rect class="box" x="634" y="62" width="106" height="24" rx="4"/><text class="t2" x="687" y="74">MQTT Broker</text><rect class="box" x="634" y="94" width="106" height="24" rx="4"/><text class="t2" x="687" y="106">Time Series DB</text><rect class="box" x="634" y="126" width="106" height="24" rx="4"/><text class="t2" x="687" y="138">Dashboard</text><rect class="box" x="634" y="158" width="106" height="24" rx="4"/><text class="t2" x="687" y="170">Alerting</text><rect class="box" x="634" y="190" width="106" height="24" rx="4"/><text class="t2" x="687" y="202">Device Mgmt</text><line class="arr" x1="144" y1="130" x2="168" y2="130"/><line class="arr" x1="590" y1="130" x2="624" y2="130"/><rect class="box" x="14" y="240" width="732" height="18" rx="4"/><text class="t3" x="380" y="249">&lt; 100 ms field-to-cloud latency  ·  Store-and-forward on connectivity loss  ·  mTLS device auth</text></svg>