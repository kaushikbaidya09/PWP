<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 700 640" width="700" height="640">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="700" height="640" fill="#ffffff"/>
  <rect x="40" y="40" width="220" height="80" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150" y="70" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">PERIPHERAL</text>
  <text x="150" y="90" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">(UART, Timer, GPIO, ADC)</text>
  <rect x="440" y="40" width="220" height="80" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="550" y="70" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">NVIC</text>
  <text x="550" y="90" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">(Cortex-M)</text>
  <line x1="260" y1="80" x2="440" y2="80" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="71" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">IRQ line asserted</text>
  <line x1="550" y1="120" x2="550" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="550" y="166" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">interrupt request</text>
  <rect x="440" y="230" width="220" height="210" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="550" y="285" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">CPU</text>
  <text x="550" y="325" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">1. Finish current instruction</text>
  <text x="550" y="345" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">2. Save context (push regs)</text>
  <text x="550" y="365" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">3. Fetch interrupt vector</text>
  <text x="550" y="385" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">4. Jump to ISR</text>
  <line x1="550" y1="440" x2="550" y2="530" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="440" y="530" width="220" height="70" rx="8" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  <text x="550" y="555" text-anchor="middle" dominant-baseline="middle" fill="#7f1d1d" font-size="13">ISR Handler</text>
  <text x="550" y="575" text-anchor="middle" dominant-baseline="middle" fill="#7f1d1d" font-size="13">(clear flag, post event)</text>
  <rect x="40" y="530" width="220" height="70" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="150" y="555" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Resume interrupted</text>
  <text x="150" y="575" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">background code</text>
  <line x1="440" y1="565" x2="260" y2="565" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="556" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">restore context</text>
</svg>