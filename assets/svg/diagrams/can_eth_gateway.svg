<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 260" fill="none" aria-label="CAN-FD to Ethernet UDP Gateway Architecture — STM32H7"><style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&amp;display=swap');
.bg  { fill: var(--surface, #111114); }
.box { fill: var(--surface-2, #18181c); stroke: var(--border-2, rgba(255,255,255,.38)); stroke-width: 1.4; }
.box-hi { fill: var(--surface-3, #202024); stroke: var(--border-3, rgba(255,255,255,.55)); stroke-width: 1.4; }
.line { stroke: var(--border-3, rgba(255,255,255,.55)); stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.arr { stroke: var(--border-3, rgba(255,255,255,.55)); stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
.arr-bi { stroke: var(--border-3, rgba(255,255,255,.55)); stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); marker-start: url(#arrowhead-start); }
.t1 { font-family:"DM Sans",system-ui,sans-serif; font-size:11px; font-weight:600; fill:var(--text,#fff); text-anchor:middle; dominant-baseline:middle; }
.t2 { font-family:"DM Sans",system-ui,sans-serif; font-size:10px; fill:var(--text-2,rgba(255,255,255,.88)); text-anchor:middle; dominant-baseline:middle; }
.t3 { font-family:"DM Sans",system-ui,sans-serif; font-size:9px; fill:var(--text-3,rgba(255,255,255,.70)); text-anchor:middle; dominant-baseline:middle; }
.tlabel { font-family:"DM Sans",system-ui,sans-serif; font-size:9px; fill:var(--text-4,rgba(255,255,255,.50)); dominant-baseline:middle; }
.badge { fill:var(--surface-3,#202024); stroke:var(--border-2,rgba(255,255,255,.38)); stroke-width:1; }
.div { stroke: var(--border,rgba(255,255,255,.22)); stroke-width:1; }</style><defs/><text class="t3" x="380" y="14">CAN FD → ETHERNET UDP GATEWAY  (STM32H7 + FreeRTOS)</text><rect class="box" x="14" y="28" width="140" height="50" rx="6"/><text class="t1" x="84" y="46">CAN FD Bus</text><text class="t3" x="84" y="60">2 × FDCAN  8 Mbps</text><rect class="box-hi" x="200" y="28" width="360" height="200" rx="8"/><text class="t1" x="380" y="46">STM32H7  (480 MHz Cortex-M7)</text><line class="div" x1="201" y1="54" x2="559" y2="54"/><rect class="box" x="212" y="64" width="88" height="44" rx="4"/><text class="t2" x="256" y="80">CAN RX Task</text><text class="t3" x="256" y="94">DMA → FIFO</text><line class="arr" x1="302" y1="86" x2="316" y2="86"/><rect class="box" x="312" y="64" width="88" height="44" rx="4"/><text class="t2" x="356" y="80">Router Task</text><text class="t3" x="356" y="94">ID filter</text><line class="arr" x1="402" y1="86" x2="416" y2="86"/><rect class="box" x="412" y="64" width="88" height="44" rx="4"/><text class="t2" x="456" y="80">UDP TX Task</text><text class="t3" x="456" y="94">LWIP stack</text><line class="arr" x1="502" y1="86" x2="516" y2="86"/><rect class="box" x="512" y="64" width="88" height="44" rx="4"/><text class="t2" x="556" y="80">Config Task</text><text class="t3" x="556" y="94">UART CLI</text><rect class="box" x="212" y="120" width="338" height="26" rx="4"/><text class="t3" x="381" y="133">FreeRTOS  ·  Queue  ·  Semaphore  ·  DMA</text><rect class="box" x="212" y="158" width="156" height="28" rx="4"/><text class="t2" x="290" y="172">FDCAN1/2  +  TJA1051</text><rect class="box" x="382" y="158" width="168" height="28" rx="4"/><text class="t2" x="466" y="172">ETH MAC  +  DP83848</text><rect class="box" x="606" y="28" width="140" height="50" rx="6"/><text class="t1" x="676" y="46">Ethernet</text><text class="t3" x="676" y="60">100BASE-TX  UDP</text><line class="arr" x1="154" y1="53" x2="198" y2="53"/><line class="arr" x1="560" y1="53" x2="604" y2="53"/><rect class="box" x="200" y="238" width="360" height="22" rx="4"/><text class="t3" x="380" y="249">≤ 500 µs end-to-end  ·  10 000 frames/s sustained  ·  zero frame loss</text></svg>