<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 700 430" width="700" height="430">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="700" height="430" fill="#ffffff"/>
  <rect x="40" y="40" width="190" height="60" rx="8" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  <text x="135" y="70" text-anchor="middle" dominant-baseline="middle" fill="#7f1d1d" font-size="13">Task A  (Priority HIGH)</text>
  <rect x="40" y="120" width="190" height="60" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="135" y="150" text-anchor="middle" dominant-baseline="middle" fill="#78350f" font-size="13">Task B  (Priority MED)</text>
  <rect x="40" y="200" width="190" height="60" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="135" y="230" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">Task C  (Priority LOW)</text>
  <rect x="40" y="280" width="190" height="60" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="135" y="310" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">ISR  (NMI / IRQ)</text>
  <line x1="230" y1="70" x2="310" y2="155" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="230" y1="150" x2="310" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="230" y1="230" x2="310" y2="165" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="230" y1="310" x2="310" y2="345" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="100" width="360" height="120" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="490" y="141" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">GLOBAL STATE / RAM</text>
  <text x="490" y="160" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">ring buffer  ·  peripheral register</text>
  <text x="490" y="179" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">linked list  /  queue</text>
  <line x1="490" y1="220" x2="490" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="310" y="300" width="360" height="100" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="490" y="331" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="12">SYNCHRONIZATION</text>
  <text x="490" y="350" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="12">Mutex  ·  Semaphore</text>
  <text x="490" y="369" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="12">Spinlock  ·  Critical section</text>
</svg>