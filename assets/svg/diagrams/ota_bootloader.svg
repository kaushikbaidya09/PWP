<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 270" fill="none" aria-label="OTA Bootloader Dual-Bank Update Flow"><style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&amp;display=swap');
.bg  { fill: var(--surface, #111114); }
.box { fill: var(--surface-2, #18181c); stroke: var(--border-2, rgba(255,255,255,.38)); stroke-width: 1.4; }
.box-hi { fill: var(--surface-3, #202024); stroke: var(--border-3, rgba(255,255,255,.55)); stroke-width: 1.4; }
.line { stroke: var(--border-3, rgba(255,255,255,.55)); stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.arr { stroke: var(--border-3, rgba(255,255,255,.55)); stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); }
.arr-bi { stroke: var(--border-3, rgba(255,255,255,.55)); stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowhead); marker-start: url(#arrowhead-start); }
.t1 { font-family:"DM Sans",system-ui,sans-serif; font-size:11px; font-weight:600; fill:var(--text,#fff); text-anchor:middle; dominant-baseline:middle; }
.t2 { font-family:"DM Sans",system-ui,sans-serif; font-size:10px; fill:var(--text-2,rgba(255,255,255,.88)); text-anchor:middle; dominant-baseline:middle; }
.t3 { font-family:"DM Sans",system-ui,sans-serif; font-size:9px; fill:var(--text-3,rgba(255,255,255,.70)); text-anchor:middle; dominant-baseline:middle; }
.tlabel { font-family:"DM Sans",system-ui,sans-serif; font-size:9px; fill:var(--text-4,rgba(255,255,255,.50)); dominant-baseline:middle; }
.badge { fill:var(--surface-3,#202024); stroke:var(--border-2,rgba(255,255,255,.38)); stroke-width:1; }
.div { stroke: var(--border,rgba(255,255,255,.22)); stroke-width:1; }</style><defs/><text class="t3" x="380" y="14">OTA BOOTLOADER  — DUAL-BANK ECDSA UPDATE FLOW</text><text class="t3" x="170" y="34">FLASH LAYOUT</text><rect class="box-hi" x="14" y="46" width="300" height="36" rx="4"/><text class="t1" x="164" y="59">Bootloader</text><text class="t3" x="164" y="72">64 KB · ROM-like</text><rect class="box-hi" x="14" y="84" width="300" height="36" rx="4"/><text class="t1" x="164" y="97">Bank A (active)</text><text class="t3" x="164" y="110">Active firmware</text><rect class="box" x="14" y="122" width="300" height="36" rx="4"/><text class="t1" x="164" y="135">Bank B (update)</text><text class="t3" x="164" y="148">Incoming image</text><rect class="box-hi" x="14" y="160" width="300" height="36" rx="4"/><text class="t1" x="164" y="173">OTP + Keys</text><text class="t3" x="164" y="186">Anti-rollback · ECDSA pubkey</text><line class="arr" x1="314" y1="140" x2="354" y2="140"/><text class="t3" x="555" y="34">UPDATE SEQUENCE</text><rect class="box" x="358" y="46" width="118" height="66" rx="6"/><text class="t1" x="417" y="64">1. Receive</text><text class="t3" x="417" y="88">firmware over</text><text class="t3" x="417" y="101">UART / CAN</text><rect class="box" x="496" y="46" width="118" height="66" rx="6"/><text class="t1" x="555" y="64">2. Write</text><text class="t3" x="555" y="88">to Bank B</text><text class="t3" x="555" y="101">(sector-by-sector)</text><rect class="box-hi" x="634" y="46" width="118" height="66" rx="6"/><text class="t1" x="693" y="59">3. Verify</text><text class="t1" x="693" y="72">ECDSA</text><text class="t3" x="693" y="88">secp256k1</text><text class="t3" x="693" y="101">signature</text><rect class="box" x="358" y="152" width="118" height="66" rx="6"/><text class="t1" x="417" y="165">4. Anti-</text><text class="t1" x="417" y="178">Rollback</text><text class="t3" x="417" y="194">OTP version</text><text class="t3" x="417" y="207">check</text><rect class="box" x="496" y="152" width="118" height="66" rx="6"/><text class="t1" x="555" y="165">5. Set</text><text class="t1" x="555" y="178">Boot Flag</text><text class="t3" x="555" y="194">swap banks</text><text class="t3" x="555" y="207">on next reset</text><rect class="box" x="634" y="152" width="118" height="66" rx="6"/><text class="t1" x="693" y="165">6. Reset</text><text class="t1" x="693" y="178">→ Bank B</text><text class="t3" x="693" y="194">Boot from</text><text class="t3" x="693" y="207">new firmware</text><line class="arr" x1="476" y1="79" x2="494" y2="79"/><line class="arr" x1="614" y1="79" x2="632" y2="79"/><line class="arr" x1="700" y1="112" x2="700" y2="150"/><line class="arr" x1="614" y1="185" x2="476" y2="185"/><line class="arr" x1="476" y1="185" x2="476" y2="185"/><rect class="box" x="358" y="232" width="394" height="26" rx="4"/><text class="t3" x="555" y="245">Fail → erase Bank B · signal error · stay on Bank A</text></svg>