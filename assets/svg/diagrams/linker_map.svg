<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 760 910" width="760" height="910">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="760" height="910" fill="#ffffff"/>
  <rect x="230" y="30" width="280" height="60" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="370" y="60" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">Source Files  (.c, .s)</text>
  <line x1="370" y1="90" x2="370" y2="170" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370" y="121" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">compile</text>
  <rect x="230" y="170" width="280" height="60" rx="8" fill="#f9fafb" stroke="#374151" stroke-width="2"/>
  <text x="370" y="200" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="13">Compiler / Assembler</text>
  <line x1="370" y1="230" x2="370" y2="310" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="230" y="310" width="280" height="70" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="370" y="336" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">Object Files  (.o)</text>
  <text x="370" y="355" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">relocatable — no fixed addresses</text>
  <line x1="370" y1="380" x2="370" y2="460" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="180" y1="430" x2="230" y2="490" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="205" y="451" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">linker script</text>
  <rect x="40" y="380" width="160" height="90" rx="8" fill="#f9fafb" stroke="#374151" stroke-width="2"/>
  <text x="120" y="408" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="11">Linker Script  (.ld)</text>
  <text x="120" y="425" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="11">MEMORY regions</text>
  <text x="120" y="442" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="11">SECTIONS layout</text>
  <rect x="230" y="460" width="280" height="60" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="370" y="490" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="16">LINKER</text>
  <line x1="510" y1="490" x2="560" y2="490" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="560" y="460" width="180" height="60" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="650" y="490" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">ELF Executable</text>
  <line x1="650" y1="520" x2="650" y2="590" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="560" y="590" width="180" height="60" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="650" y="610" text-anchor="middle" dominant-baseline="middle" fill="#78350f" font-size="13">.bin / .hex</text>
  <text x="650" y="630" text-anchor="middle" dominant-baseline="middle" fill="#78350f" font-size="13">(objcopy)</text>
  <line x1="650" y1="650" x2="650" y2="710" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="560" y="710" width="180" height="60" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="650" y="740" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Flash Programmer</text>
  <line x1="650" y1="770" x2="650" y2="830" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="540" y="830" width="200" height="100" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="640" y="855" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="11">MCU Flash</text>
  <text x="640" y="872" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="11">0x08000000  .vectors</text>
  <text x="640" y="889" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="11">0x08000100  .text</text>
  <text x="640" y="906" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="11">0x0800xxxx  .data init</text>
  <rect x="230" y="830" width="200" height="100" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="330" y="855" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="11">MCU SRAM</text>
  <text x="330" y="872" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="11">0x20000000  .data</text>
  <text x="330" y="889" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="11">0x2000xxxx  .bss</text>
  <text x="330" y="906" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="11">Heap ↑     ↓ Stack</text>
</svg>