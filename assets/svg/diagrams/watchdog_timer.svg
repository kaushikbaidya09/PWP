<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 740 530" width="740" height="530">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="740" height="530" fill="#ffffff"/>
  <rect x="60" y="50" width="200" height="140" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="160" y="80" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">Application Firmware</text>
  <text x="160" y="120" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">[Task 1]</text>
  <text x="160" y="140" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">[Task 2]</text>
  <text x="160" y="160" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">[Task 3]</text>
  <line x1="260" y1="120" x2="360" y2="120" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="111" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">periodic kick</text>
  <rect x="360" y="50" width="260" height="140" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="490" y="90" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">Watchdog Timer (IWDG / WWDG)</text>
  <text x="490" y="130" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">Down-counter</text>
  <text x="490" y="150" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">LSI / IWDG oscillator</text>
  <line x1="490" y1="190" x2="490" y2="300" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="490" y="236" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">counter expires</text>
  <rect x="360" y="300" width="260" height="70" rx="8" fill="#fee2e2" stroke="#991b1b" stroke-width="2"/>
  <text x="490" y="325" text-anchor="middle" dominant-baseline="middle" fill="#7f1d1d" font-size="13">Reset Logic</text>
  <text x="490" y="345" text-anchor="middle" dominant-baseline="middle" fill="#7f1d1d" font-size="13">(RST pin)</text>
  <line x1="420" y1="370" x2="160" y2="440" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="370" x2="490" y2="440" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="440" width="200" height="70" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <text x="160" y="465" text-anchor="middle" dominant-baseline="middle" fill="#78350f" font-size="13">Log reset cause</text>
  <text x="160" y="485" text-anchor="middle" dominant-baseline="middle" fill="#78350f" font-size="13">(backup register)</text>
  <rect x="360" y="440" width="260" height="70" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="490" y="475" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">Execute recovery sequence</text>
</svg>