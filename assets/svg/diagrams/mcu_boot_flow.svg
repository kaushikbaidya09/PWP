<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 700 730" width="700" height="730">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="700" height="730" fill="#ffffff"/>
  <rect x="210" y="30" width="280" height="70" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="350" y="56" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">POWER ON / RESET</text>
  <text x="350" y="75" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">(internal RC, registers cleared)</text>
  <line x1="350" y1="100" x2="350" y2="190" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="210" y="190" width="280" height="80" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="350" y="211" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="12">Vector Table Fetch</text>
  <text x="350" y="230" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="12">Word 0: Initial SP</text>
  <text x="350" y="249" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="12">Word 1: Reset Handler addr</text>
  <line x1="350" y1="270" x2="350" y2="360" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="210" y="360" width="280" height="110" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="350" y="387" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="12">Reset Handler</text>
  <text x="350" y="406" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="12">— copy .data  flash → RAM</text>
  <text x="350" y="425" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="12">— zero .bss in RAM</text>
  <text x="350" y="444" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="12">— optional: SystemInit()</text>
  <line x1="350" y1="470" x2="350" y2="560" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="210" y="560" width="280" height="70" rx="8" fill="#f9fafb" stroke="#374151" stroke-width="2"/>
  <text x="350" y="586" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="12">C Runtime Init</text>
  <text x="350" y="605" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="12">__libc_init_array()  /  C++ ctors</text>
  <line x1="350" y1="630" x2="350" y2="700" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="210" y="700" width="280" height="60" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="350" y="730" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="16">main()</text>
</svg>