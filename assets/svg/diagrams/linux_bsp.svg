board layer</text><rect class="box" x="390" y="78" width="356" height="32" rx="4"/><text class="t1" x="568" y="90">meta-imx</text><text class="t3" x="568" y="102">NXP i.MX8 support</text><rect class="box" x="390" y="112" width="356" height="32" rx="4"/><text class="t1" x="568" y="124">meta-openembedded</text><text class="t3" x="568" y="136">OE core recipes</text><rect class="box" x="390" y="146" width="356" height="32" rx="4"/><text class="t1" x="568" y="158">openembedded-core</text><text class="t3" x="568" y="170">Poky base</text><rect class="box-hi" x="390" y="186" width="356" height="50" rx="4"/><text class="t1" x="568" y="202">Custom Kernel Drivers</text><text class="t3" x="568" y="216">MIPI CSI-2 · PCIe · USB3 · CAN FD</text><text class="t3" x="568" y="228">Platform: ARM Device Tree bindings</text></svg>