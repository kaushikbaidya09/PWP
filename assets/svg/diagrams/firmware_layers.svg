<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 780 640" width="780" height="640">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="780" height="640" fill="#ffffff"/>
  <rect x="90" y="40" width="600" height="80" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="390" y="70" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">APPLICATION LAYER</text>
  <text x="390" y="90" text-anchor="middle" dominant-baseline="middle" fill="#14532d" font-size="13">product logic, system coordination</text>
  <line x1="390" y1="120" x2="390" y2="180" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="390" y="141" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">calls down</text>
  <rect x="90" y="180" width="600" height="80" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="390" y="210" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">MIDDLEWARE LAYER</text>
  <text x="390" y="230" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">protocol stacks, algorithms, utilities</text>
  <line x1="390" y1="260" x2="390" y2="320" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="390" y="281" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">calls down</text>
  <rect x="90" y="320" width="600" height="80" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="390" y="350" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="13">DRIVER LAYER</text>
  <text x="390" y="370" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="13">per-device protocol sequencing</text>
  <line x1="390" y1="400" x2="390" y2="460" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="390" y="421" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">calls down</text>
  <rect x="90" y="460" width="600" height="80" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="390" y="490" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">HARDWARE ABSTRACTION LAYER  (HAL)</text>
  <text x="390" y="510" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">peripheral capability interfaces</text>
  <line x1="390" y1="540" x2="390" y2="600" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <text x="390" y="561" text-anchor="middle" dominant-baseline="middle" fill="#9ca3af" font-size="11">calls down</text>
  <rect x="90" y="600" width="600" height="60" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="390" y="630" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="12">BSP / REGISTERS — MCU-specific, board-specific configuration</text>
</svg>