<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 740 430" width="740" height="430">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="740" height="430" fill="#ffffff"/>
  <rect x="60" y="40" width="220" height="70" rx="8" fill="#d1fae5" stroke="#065f46" stroke-width="2"/>
  <text x="170" y="65" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">CPU</text>
  <text x="170" y="85" text-anchor="middle" dominant-baseline="middle" fill="#064e3b" font-size="13">(Cortex-M core)</text>
  <rect x="460" y="40" width="220" height="70" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="570" y="65" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">DMA CONTROLLER</text>
  <text x="570" y="85" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">(DMA1 / DMA2)</text>
  <line x1="170" y1="110" x2="320" y2="200" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="570" y1="110" x2="420" y2="200" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="200" y="200" width="340" height="60" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="370" y="230" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="15">AHB BUS MATRIX</text>
  <line x1="220" y1="260" x2="130" y2="350" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="370" y1="260" x2="370" y2="350" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="260" x2="580" y2="350" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="40" y="350" width="180" height="70" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="130" y="375" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">Flash / SRAM</text>
  <text x="130" y="395" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">code + data</text>
  <rect x="280" y="350" width="180" height="70" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="370" y="375" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">SRAM</text>
  <text x="370" y="395" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">buffers</text>
  <rect x="500" y="350" width="180" height="70" rx="8" fill="#f9fafb" stroke="#374151" stroke-width="2"/>
  <text x="590" y="375" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="13">Peripheral Bus</text>
  <text x="590" y="395" text-anchor="middle" dominant-baseline="middle" fill="#111827" font-size="13">(APB)</text>
</svg>