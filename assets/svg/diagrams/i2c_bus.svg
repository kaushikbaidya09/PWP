<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 720 500" width="720" height="500">
  <defs>
    <style>text{font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;font-weight:500}</style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="720" height="500" fill="#ffffff"/>
  <rect x="60" y="40" width="240" height="80" rx="8" fill="#ede9fe" stroke="#5b21b6" stroke-width="2"/>
  <text x="180" y="70" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">I²C MASTER</text>
  <text x="180" y="90" text-anchor="middle" dominant-baseline="middle" fill="#4c1d95" font-size="13">(MCU / CPU)</text>
  <line x1="350" y1="80" x2="350" y2="210" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="350" y1="80" x2="350" y2="290" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="210" width="600" height="40" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="360" y="230" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="13">SDA  (data)  — open-drain, pull-up to VCC</text>
  <rect x="60" y="290" width="600" height="40" rx="8" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="360" y="310" text-anchor="middle" dominant-baseline="middle" fill="#164e63" font-size="13">SCL  (clock) — open-drain, pull-up to VCC</text>
  <line x1="150" y1="330" x2="150" y2="400" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="360" y1="330" x2="360" y2="400" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="570" y1="330" x2="570" y2="400" stroke="#6b7280" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="60" y="400" width="180" height="80" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="150" y="430" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">Slave 0x50</text>
  <text x="150" y="450" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">(EEPROM)</text>
  <rect x="270" y="400" width="180" height="80" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="360" y="430" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">Slave 0x48</text>
  <text x="360" y="450" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">(Temp sensor)</text>
  <rect x="480" y="400" width="180" height="80" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="570" y="430" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">Slave 0x68</text>
  <text x="570" y="450" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a" font-size="13">(IMU)</text>
</svg>