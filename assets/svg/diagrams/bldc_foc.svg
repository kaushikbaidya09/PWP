<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 250" fill="none" aria-label="FOC Sensorless BLDC Drive Architecture — STM32G4"><style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&amp;display=swap');
.bg  { fill: var(--surface, #111114); }
