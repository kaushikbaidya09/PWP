.badge { fill:var(--surface-3,#202024); stroke:var(--border-2,rgba(255,255,255,.38)); stroke-width:1; }
.div { stroke: var(--border,rgba(255,255,255,.22)); stroke-width:1; }</style><defs/><text class="t3" x="380" y="14">FOC SENSORLESS BLDC DRIVE  (STM32G4 · 20 kHz PWM)</text><rect class="box" x="14" y="30" width="90" height="56" rx="5"/><text class="t1" x="59" y="52">Speed</text><text class="t2" x="59" y="64">Setpoint</text><text class="t3" x="59" y="76">RPM target</text><line class="arr" x1="105" y1="58" x2="117" y2="58"/><rect class="box" x="124" y="30" width="80" height="56" rx="5"/><text class="t1" x="164" y="52">Speed</text><text class="t2" x="164" y="64">PI</text><text class="t3" x="164" y="76">Kp/Ki</text><line class="arr" x1="205" y1="58" x2="217" y2="58"/><rect class="box" x="224" y="30" width="90" height="56" rx="5"/><text class="t1" x="269" y="52">Current</text><text class="t2" x="269" y="64">PI (d/q)</text><text class="t3" x="269" y="76">@ 20 kHz</text><line class="arr" x1="315" y1="58" x2="327" y2="58"/><rect class="box" x="334" y="30" width="90" height="56" rx="5"/><text class="t1" x="379" y="52">SVPWM</text><text class="t2" x="379" y="64">Modulator</text><text class="t3" x="379" y="76">3-phase</text><line class="arr" x1="425" y1="58" x2="437" y2="58"/><rect class="box-hi" x="444" y="30" width="80" height="56" rx="5"/><text class="t1" x="484" y="52">BLDC</text><text class="t2" x="484" y="64">Motor</text><text class="t3" x="484" y="76">3-phase</text><line class="arr" x1="525" y1="58" x2="537" y2="58"/><rect class="box" x="554" y="30" width="90" height="56" rx="5"/><text class="t1" x="599" y="52">BEMF</text><text class="t2" x="599" y="64">Estimator</text><text class="t3" x="599" y="76">Sensorless</text><line class="arr" x1="645" y1="58" x2="657" y2="58"/><rect class="box" x="664" y="30" width="88" height="56" rx="5"/><text class="t1" x="708" y="52">Clarke /</text><text class="t2" x="708" y="64">Park</text><text class="t3" x="708" y="76">αβ → dq</text><line class="line" x1="706" y1="86" x2="706" y2="140"/><line class="line" x1="706" y1="140" x2="270" y2="140"/><line class="arr" x1="272" y1="140" x2="270" y2="86"/><text class="t3" x="490" y="135">ADC current feedback (DMA)  →  Clarke/Park  →  dq-axis currents</text><rect class="box" x="460" y="150" width="120" height="36" rx="4"/><text class="t1" x="520" y="162">ADC (12-bit)</text><text class="t3" x="520" y="174">Phase currents Ia Ib</text><line class="arr" x1="520" y1="86" x2="520" y2="148"/><line class="line" x1="484" y1="86" x2="484" y2="200"/><line class="line" x1="484" y1="200" x2="160" y2="200"/><line class="arr" x1="162" y1="200" x2="162" y2="86"/><text class="t3" x="323" y="194">Estimated speed (from BEMF)</text><rect class="box" x="14" y="220" width="732" height="24" rx="4"/><text class="t3" x="380" y="232">0 – 6000 RPM  ·  ±0.5% speed accuracy  ·  CMSIS-DSP fixed-point math  ·  STM32G4 CORDIC accelerator</text></svg>